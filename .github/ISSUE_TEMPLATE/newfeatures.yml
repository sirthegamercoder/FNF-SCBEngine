name: New feature request
description: Suggest new features or improvements for the port here
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: "Describe your feature request here."
    validations:
      required: true

  - type: dropdown
    id: btarget
    attributes:
      label: "What is your build target?"
      options:
        - "Desktop (Linux, Windows or Mac)"
        - "Android"
        - "iOS"
        - "Other/Unknown/I don't know"
    validations:
      required: true

  - type: dropdown
    id: scbver
    attributes:
      label: "Which SCB Engine version you're on?"
      options:
        - "1.0.0"
        - "1.0.2"
        - "1.1"
        - "1.1.3"
        - "1.1.5"
    validations:
      required: true

  - type: input
    id: buildsummary
    attributes:
      label: "Did you edit anything in this build? If so, mention or summarize your changes."
      placeholder: "Yes, I edited ClientPrefs.hx and tried to add a new setting"
    validations:
      required: false